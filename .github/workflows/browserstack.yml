name: BrowserStack Cypress Tests

on:
  workflow_dispatch:
    inputs:
      browserstack-rerun-tests:
        description: 'Internal input for BrowserStack rerun'
        required: false
  push:
    branches:
      - main
      - development
  pull_request:

env:
  BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
  BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
  SECRET_STAGE: ${{ secrets.SECRET_STAGE }}
  SECRET_DEV: ${{ secrets.SECRET_DEV }}
  API_KEY_STAGE: ${{ secrets.API_KEY_STAGE }}
  API_KEY_DEV: ${{ secrets.API_KEY_DEV }}
  PROJECT_ID_DEV: ${{ secrets.PROJECT_ID_DEV }}
  PROJECT_ID_STAGE: ${{ secrets.PROJECT_ID_STAGE }}
  SYSTEM_ID_STAGE: ${{ secrets.SYSTEM_ID_STAGE }}
  SYSTEM_ID_DEV: ${{ secrets.SYSTEM_ID_DEV }}
  HOSPITAL_ID_STAGE: ${{ secrets.HOSPITAL_ID_STAGE }}
  HOSPITAL_ID_DEV: ${{ secrets.HOSPITAL_ID_DEV }}
  ENVIRONMENT_BLUEPRINT_ID_STAGE: ${{ secrets.ENVIRONMENT_BLUEPRINT_ID_STAGE }}
  ENVIRONMENT_BLUEPRINT_ID_DEV: ${{ secrets.ENVIRONMENT_BLUEPRINT_ID_DEV }}
  STAFF_BLUEPRINT_ID_STAGE: ${{ secrets.STAFF_BLUEPRINT_ID_STAGE }}
  STAFF_BLUEPRINT_ID_DEV: ${{ secrets.STAFF_BLUEPRINT_ID_DEV }}
  ASSET_BLUEPRINT_ID_STAGE: ${{ secrets.ASSET_BLUEPRINT_ID_STAGE }}
  ASSET_BLUEPRINT_ID_DEV: ${{ secrets.ASSET_BLUEPRINT_ID_DEV }}
  BROWSERSTACK_RERUN: ${{ secrets.BROWSERSTACK_RERUN }}

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Force Clean Install
        run: |
          # 1. Wipe out any existing broken local links
          rm -rf node_modules package-lock.json
          
          # 2. Install ONLY the essential CLI tool fresh from NPM
          npm install browserstack-cypress-cli
          
          # 3. If your tests need other dependencies, install them too:
          # npm install cypress 

      - name: Run BrowserStack Cypress tests
        run: |
          if [ "${{ github.event.inputs['browserstack-rerun-tests'] }}" != "" ]; then
            echo "Rerunning specific failed tests..."
            ./node_modules/.bin/browserstack-cypress run --spec "${{ github.event.inputs['browserstack-rerun-tests'] }}" --sync
          else
            echo "Running full regression suite..."
            ./node_modules/.bin/browserstack-cypress run --spec "cypress/e2e/regressionSuites/desktop/prosightSafety/**/*.cy.js" --sync
          fi